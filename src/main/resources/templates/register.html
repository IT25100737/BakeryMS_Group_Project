<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Baker - Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
        }

        /* ---  (Background Curve) --- */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 0% 0%, #fff9c4 0%, #ffffff 70%);
            clip-path: ellipse(80% 100% at 0% 0%);
            z-index: -1;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .reg-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            background: linear-gradient(45deg, #2b2d42, #8d99ae);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.05));
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Form Elements --- */
        .form-control {
            border-radius: 12px;
            border: 1px solid #eceff1;
            padding: 12px 18px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            background-color: #fcfcfc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 5px 15px rgba(25, 135, 84, 0.1);
            border-color: #198754;
            background-color: #fff;
        }

        /* File input styling */
        input[type="file"].form-control {
            padding: 10px;
        }

        .btn-register {
            background: linear-gradient(to right, #198754, #27ae60);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 60px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(25, 135, 84, 0.2);
            cursor: pointer;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(25, 135, 84, 0.3);
            color: #fff;
        }

        .login-link-btn {
            background-color: #006680;
            color: white !important;
            text-decoration: none;
            padding: 8px 22px;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: 0.3s;
            display: inline-block;
        }

        .login-link-btn:hover {
            background-color: #004d61;
            transform: scale(1.05);
        }

        .container {
            z-index: 10;
            padding: 30px;
        }

        /* Error massage */
        .error-msg { color: #e74c3c; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div class="welcome-section">
        <h1 class="reg-title">User Registration</h1>
        <p class="text-muted">Create an account to enjoy our delicious bakery items!</p>
    </div>

    <form th:action="@{/register}" method="post" enctype="multipart/form-data">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <input type="text" name="fullName" class="form-control" placeholder="Enter Full Name" required>
                <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
                <input type="email" name="email" class="form-control" placeholder="Enter Email" required>
                <input type="text" name="mobile" class="form-control" placeholder="Enter Mobile Number" required>
            </div>

            <div class="col-lg-5">
                <textarea name="address" class="form-control" placeholder="Enter Address" rows="1" required style="height: 52px;"></textarea>
                <input type="text" name="postCode" class="form-control" placeholder="Enter Post/Zip Code" required>

                <div class="mb-3">
                    <label class="small text-muted mb-1 ms-1">Choose Profile Picture (Optional)</label>
                    <input type="file" name="imageFile" class="form-control" accept="image/*">
                </div>

                <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
            </div>
        </div>

        <div class="row justify-content-center mt-4">
            <div class="col-lg-10 d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
                <button type="submit" class="btn btn-register">Register Now</button>
                <div class="text-center">
                    <span class="text-muted small">Already registered?</span>
                    <a th:href="@{/login}" class="login-link-btn ms-2">Login here..</a>
                </div>
            </div>
        </div>
    </form>
</div>

</body>
</html>
