<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile - Baker</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <!-- CSS Stylesheets -->
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">

    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Roboto', sans-serif;
        }
        .edit-container {
            max-width: 650px;
            margin: 80px auto;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-radius: 15px;
            background-color: white;
            border: none;
        }
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-header i {
            font-size: 3rem;
            color: #bc815d;
            margin-bottom: 15px;
        }
        .form-header h2 {
            font-family: 'Playfair Display', serif;
            color: #333;
            font-weight: 700;
        }
        .form-label {
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .form-control {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #e1e1e1;
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: #bc815d;
            box-shadow: 0 0 0 0.2rem rgba(188, 129, 93, 0.1);
        }
        .btn-save {
            background-color: #bc815d;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(188, 129, 93, 0.3);
        }
        .btn-save:hover {
            background-color: #a06d4e;
            color: white;
            transform: translateY(-2px);
        }
        .btn-cancel {
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="edit-container">
        <div class="form-header">
            <i class="fa fa-user-edit"></i>
            <h2>Edit Your Profile</h2>
            <p class="text-muted">Update your account information below to keep your profile current.</p>
        </div>

        <hr class="mb-4">

        <!--
          Important: Verification for 'postCode' name attribute
          to prevent mapping issues as noted in your logs.
        -->
        <form th:action="@{/updateProfile}" method="post">

            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted"><i class="fa fa-user"></i></span>
                        <input type="text" name="fullName" class="form-control" th:value="${session.user.fullName}" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Mobile Number</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted"><i class="fa fa-phone"></i></span>
                        <input type="text" name="mobile" class="form-control" th:value="${session.user.mobile}" placeholder="07XXXXXXXX" required>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Post Code</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted"><i class="fa fa-map-pin"></i></span>
                        <input type="text" name="postCode" class="form-control" th:value="${session.user.postCode}" placeholder="Enter postal code" required>
                    </div>
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label">Delivery Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted"><i class="fa fa-home"></i></span>
                        <textarea name="address" class="form-control" rows="3" placeholder="Enter your full residential address" required th:text="${session.user.address}"></textarea>
                    </div>
                </div>
            </div>

            <div class="mt-4 d-grid gap-2 d-md-flex justify-content-md-center">
                <button type="submit" class="btn btn-save">Save Changes</button>
                <a th:href="@{/profile}" class="btn btn-outline-secondary btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
