<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Baker - Shopping Cart</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <style>
        body { background-color: #f4f7f6; }
        .cart-img { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; border: 1px solid #ddd; }
        .qty-btn { width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .table thead { background-color: #eef2f7; }
        .card { border-radius: 15px; overflow: hidden; }
        .total-section { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-checkout { background-color: #28a745; color: white; font-weight: bold; padding: 12px 40px; border-radius: 30px; transition: 0.3s; }
        .btn-checkout:hover { background-color: #218838; transform: scale(1.05); color: white; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/product}" class="btn btn-sm btn-outline-secondary me-3 shadow-sm">
            <i class="fa fa-arrow-left"></i>
        </a>
        <h2 class="m-0 fw-bold" style="font-family: 'Playfair Display', serif;">Your Shopping Cart</h2>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
            <div th:if="${cartItems != null and !cartItems.empty}">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead class="text-secondary small text-uppercase">
                        <tr>
                            <th>Product Details</th>
                            <th>Price</th>
                            <th class="text-center">Quantity</th>
                            <th>Subtotal</th>
                            <th class="text-center">Remove</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <img th:src="@{'/img/' + ${item.image}}" class="cart-img me-3" alt="product">
                                    <div>
                                        <h6 class="mb-0 fw-bold" th:text="${item.productName}">Product Name</h6>
                                        <small class="text-muted">Fresh Bakery Item</small>
                                    </div>
                                </div>
                            </td>
                            <td class="fw-bold" th:text="'Rs. ' + ${#numbers.formatDecimal(item.price, 0, 'COMMA', 2, 'POINT')}">Rs. 0</td>
                            <td>
                                <form th:action="@{/update-cart}" method="post" class="d-flex justify-content-center align-items-center">
                                    <input type="hidden" name="productName" th:value="${item.productName}">

                                    <button type="submit" name="action" value="-1" class="btn btn-outline-secondary qty-btn"
                                            th:disabled="${item.quantity <= 1}">-</button>

                                    <span class="mx-3 fw-bold fs-5" th:text="${item.quantity}">1</span>

                                    <button type="submit" name="action" value="1" class="btn btn-outline-secondary qty-btn">+</button>
                                </form>
                            </td>
                            <td class="fw-bold text-primary" th:text="'Rs. ' + ${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 2, 'POINT')}">Rs. 0</td>
                            <td class="text-center">
                                <a th:href="@{'/remove-from-cart/' + ${item.productName}}"
                                   class="btn btn-sm btn-light text-danger"
                                   onclick="return confirm('Do you want to remove this item from cart?')">
                                    <i class="fa fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="row mt-5 align-items-center">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <a th:href="@{/product}" class="btn btn-link text-decoration-none text-secondary p-0">
                            <i class="fa fa-chevron-left me-2"></i>Continue Shopping
                        </a>
                    </div>
                    <div class="col-md-6 text-end">
                        <div class="total-section border-top pt-3">
                            <h6 class="text-muted mb-1">Total Balance</h6>
                            <h3 class="text-primary fw-bold mb-4" th:text="'Rs. ' + ${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 2, 'POINT')}">Rs. 0.00</h3>

                            <a th:href="@{/checkout}" class="btn btn-checkout shadow">
                                Proceed to Checkout <i class="fa fa-arrow-right ms-2"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${cartItems == null or cartItems.empty}" class="text-center py-5">
                <div class="mb-4">
                    <i class="fa fa-shopping-basket fa-4x text-light"></i>
                </div>
                <h4 class="text-muted">Oops! Your cart is empty.</h4>
                <p class="text-secondary">Looks like you haven't added anything to your cart yet.</p>
                <a th:href="@{/product}" class="btn btn-primary px-5 py-2 mt-3 rounded-pill">Shop Now</a>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
