<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Baker - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
        }

        /* ---  (Background Curve) --- */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 0% 0%, #fff9c4 0%, #ffffff 70%);
            clip-path: ellipse(80% 100% at 0% 0%);
            z-index: -1;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .welcome-text {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            background: linear-gradient(45deg, #2b2d42, #8d99ae);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.05));
        }

        .sub-text {
            font-size: 1.1rem;
            color: #7f8c8d;
            font-weight: 300;
            letter-spacing: 1.5px;
        }

        /* --- Form Elements --- */
        .form-control {
            border-radius: 12px;
            border: 1px solid #eceff1;
            padding: 15px 20px;
            margin-bottom: 20px;
            font-size: 1rem;
            background-color: #fcfcfc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 5px 15px rgba(25, 135, 84, 0.1);
            border-color: #198754;
            background-color: #fff;
        }

        .btn-login {
            background: linear-gradient(to right, #198754, #27ae60);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 60px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(25, 135, 84, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(25, 135, 84, 0.3);
            color: #fff;
        }

        .register-link {
            background-color: #006680;
            color: white !important;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: 0.3s;
            display: inline-block;
        }

        .register-link:hover {
            background-color: #004d61;
            transform: scale(1.05);
        }

        .img-container img {
            max-height: 450px;
            filter: drop-shadow(15px 20px 30px rgba(0,0,0,0.08));
            animation: floatImage 6s infinite ease-in-out;
        }

        @keyframes floatImage {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .error-msg { color: #e74c3c; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div class="welcome-section">
        <h1 class="welcome-text">Welcome Back</h1>
        <p class="sub-text">Please enter your details to continue</p>
    </div>

    <div class="row align-items-center">
        <div class="col-lg-6 text-center mb-5 mb-lg-0">
            <div class="img-container">
                <img th:src="@{/img/login-graphic.png}"
                     class="img-fluid"
                     alt="Login Illustration">
            </div>
        </div>

        <div class="col-lg-5 offset-lg-1">

            <div th:if="${error}" class="error-msg mb-4 text-center text-lg-start">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/login}" method="post" class="px-3 px-lg-0">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Enter Username" required autofocus>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
                </div>

                <div class="d-flex flex-wrap align-items-center justify-content-between mt-4 gap-3">
                    <button type="submit" class="btn btn-login">Login</button>
                    <div class="d-flex align-items-center">
                        <span class="text-muted small me-2">New User?</span>
                        <a th:href="@{/register}" class="register-link">Register here..</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
