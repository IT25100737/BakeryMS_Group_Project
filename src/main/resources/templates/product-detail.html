<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title th:text="${product.name} + ' - Baker Bakery'">Product Detail</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

    <style>
        :root {
            --main-green: #96e6a1;
            --dark-green: #40c057;
            --banner-gradient: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            --glass-white: rgba(255, 255, 255, 0.85);
            --star-gold: #FFC107;
            --text-main: #2b2d42;
        }

        body { background-color: #f7fafc; font-family: 'Poppins', sans-serif; color: var(--text-main); overflow-x: hidden; }

        /* --- 3D Banner & Floating Shapes --- */
        .banner-3d {
            background: var(--banner-gradient);
            padding: 90px 20px;
            text-align: center;
            border-radius: 0 0 100px 100px;
            box-shadow: 0 15px 35px rgba(150, 230, 161, 0.3);
            position: relative;
            overflow: hidden;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
        }

        .shape {
            position: absolute;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
            border-radius: 30%;
            animation: float 8s infinite ease-in-out;
            z-index: 1;
        }
        .shape-1 { width: 120px; height: 120px; top: 10%; left: 8%; }
        .shape-2 { width: 80px; height: 80px; bottom: 10%; right: 10%; border-radius: 50%; animation-delay: 2s; }

        .banner-3d h2 { position: relative; z-index: 2; text-shadow: 0 4px 10px rgba(255,255,255,0.3); }

        /* --- Product Card Styles --- */
        .product-glass-card { background: var(--glass-white); backdrop-filter: blur(15px); border-radius: 40px; padding: 40px; margin: -60px auto 50px; max-width: 1050px; box-shadow: 0 25px 50px rgba(0,0,0,0.05); position: relative; z-index: 10; }
        .product-img { border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); transition: 0.4s; }
        .product-img:hover { transform: translateY(-10px); }

        /* --- Star Rating Input --- */
        .star-input-group { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 8px; }
        .star-input-group input { display: none; }
        .star-input-group label { font-size: 2.2rem; color: #d1d5db; cursor: pointer; transition: 0.2s; }
        .star-input-group input:checked ~ label, .star-input-group label:hover, .star-input-group label:hover ~ label { color: var(--star-gold); }

        /* --- Review Styles --- */
        .review-card { background: white; border-radius: 25px; padding: 25px; border: 1px solid #f1f3f5; margin-bottom: 20px; }
        .profile-pic { width: 50px; height: 50px; object-fit: cover; border-radius: 50%; border: 2px solid var(--main-green); }
        .btn-cart { background: linear-gradient(to right, #40c057, #2f9e44) !important; border: none; color: white; padding: 12px 35px; border-radius: 15px; font-weight: 700; }

        .text-warning { color: var(--star-gold) !important; }
    </style>
</head>

<body>

<div class="banner-3d">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <h2 class="display-4 fw-bold text-white">Product Details</h2>
</div>

<div class="container">
    <div class="product-glass-card">
        <div class="row align-items-center">
            <div class="col-lg-6 text-center">
                <img th:src="@{'/img/' + ${product.image}}" class="product-img img-fluid" alt="Product">
            </div>
            <div class="col-lg-6 ps-lg-5">
                <h1 class="display-6 fw-bold mb-2" th:text="${product.name}">Product Name</h1>

                <div class="d-flex align-items-center mb-3 text-warning">
                    <span th:if="${averageRating > 0}">
                        <i class="fas fa-star" th:each="i : ${#numbers.sequence(1, T(java.lang.Math).floor(averageRating).intValue())}"></i>
                        <i class="far fa-star" th:if="${T(java.lang.Math).floor(averageRating).intValue() < 5}"
                           th:each="i : ${#numbers.sequence(T(java.lang.Math).floor(averageRating).intValue() + 1, 5)}"></i>
                    </span>
                    <span th:if="${averageRating == 0}">
                        <i class="far fa-star" th:each="i : ${#numbers.sequence(1, 5)}"></i>
                    </span>
                    <small class="text-muted ms-2" th:text="'(' + ${#numbers.formatDecimal(averageRating, 1, 1)} + ' / 5.0)'">(0.0 / 5.0)</small>
                </div>

                <div class="mb-3">
                    <span class="fs-3 fw-bold text-success">Rs. [[${#numbers.formatDecimal(product.price, 0, 'COMMA', 2, 'POINT')}]]</span>
                </div>
                <p class="text-muted mb-4" th:text="${product.description}">Description.</p>

                <form th:action="@{/add-to-cart}" method="post">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="border rounded-3 p-1 bg-white d-flex align-items-center">
                            <button type="button" class="btn btn-sm px-3" onclick="updateQty(-1)">-</button>
                            <input type="text" id="qty-display" name="quantity" value="1" readonly class="text-center border-0 fw-bold" style="width: 40px;">
                            <button type="button" class="btn btn-sm px-3" onclick="updateQty(1)">+</button>
                        </div>
                        <input type="hidden" name="productName" th:value="${product.name}">
                        <button type="submit" class="btn btn-cart">ADD TO CART <i class="fas fa-shopping-basket ms-2"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="row mb-5 g-4">
        <div class="col-md-5">
            <div class="review-card shadow-sm">
                <h4 class="fw-bold mb-4">Rate this Product</h4>
                <form th:action="@{/add-review}" method="post">
                    <input type="hidden" name="productName" th:value="${product.name}">
                    <div class="mb-4">
                        <label class="small fw-bold text-muted d-block mb-2 text-uppercase">Your Rating</label>
                        <div class="star-input-group">
                            <input type="radio" id="star5" name="rating" value="5" required><label for="star5" class="fas fa-star"></label>
                            <input type="radio" id="star4" name="rating" value="4"><label for="star4" class="fas fa-star"></label>
                            <input type="radio" id="star3" name="rating" value="3"><label for="star3" class="fas fa-star"></label>
                            <input type="radio" id="star2" name="rating" value="2"><label for="star2" class="fas fa-star"></label>
                            <input type="radio" id="star1" name="rating" value="1"><label for="star1" class="fas fa-star"></label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <textarea name="comment" class="form-control border-0 bg-light" rows="4" placeholder="How was the taste?" style="border-radius:15px; padding:15px;" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 py-3 fw-bold" style="border-radius:15px;">POST REVIEW</button>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <div class="review-card shadow-sm">
                <h4 class="fw-bold mb-4">Customer Reviews</h4>
                <div style="max-height: 500px; overflow-y: auto; padding-right: 10px;">

                    <div th:each="review : ${reviews}" class="border-bottom pb-3 mb-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="d-flex align-items-center">
                                <img th:src="@{'/img/' + ${review.userImage}}"
                                     class="profile-pic me-3 shadow-sm"
                                     onerror="this.src='/img/user-avatar1.jpg'"
                                     style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover;">

                                <div>
                                    <span class="fw-bold d-block" th:text="${review.userName}">User Name</span>
                                    <small class="text-muted" th:text="${review.reviewDate}">Date</small>
                                </div>
                            </div>

                            <div class="d-flex align-items-center">
                                <div class="text-warning me-2">
                                    <span th:if="${review.rating > 0}">
                                        <i class="fas fa-star" th:each="i : ${#numbers.sequence(1, review.rating)}"></i>
                                        <i class="far fa-star" th:if="${review.rating < 5}" th:each="i : ${#numbers.sequence(review.rating + 1, 5)}"></i>
                                    </span>
                                    <span th:if="${review.rating == null || review.rating == 0}">
                                        <i class="far fa-star" th:each="i : ${#numbers.sequence(1, 5)}"></i>
                                    </span>
                                </div>

                                <div th:if="${session.user != null && (session.user.username == review.userName || session.user.role == 'ADMIN')}">
                                    <form th:action="@{/delete-review}" method="post" onsubmit="return confirm('Delete this review?')">
                                        <input type="hidden" name="productName" th:value="${review.productName}">
                                        <input type="hidden" name="userName" th:value="${review.userName}">
                                        <input type="hidden" name="date" th:value="${review.reviewDate}">
                                        <button type="submit" class="btn btn-link text-danger p-0 border-0 ms-2" title="Delete Review">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <p class="mt-3 text-dark mb-0 ps-3" style="border-left: 4px solid var(--main-green);" th:text="${review.comment}">Comment.</p>
                    </div>

                    <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-5 text-muted">
                        <i class="fas fa-comment-slash fa-3x mb-3"></i>
                        <p>No reviews yet. Be the first to rate!</p>
                    </div>
                </div>
            </div>
        </div>
    </div> </div> <script>
    function updateQty(val) {
        let qtyInput = document.getElementById('qty-display');
        let current = parseInt(qtyInput.value);
        current += val;
        if (current < 1) current = 1;
        qtyInput.value = current;
    }
</script>
</body>
</html>
